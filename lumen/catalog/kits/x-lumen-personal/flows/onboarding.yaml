intent: kit-onboarding
triggers: [kit-install]

slots:
  user_name:
    ask: "¿Cómo te llamo?"
    type: text
    required: true

on_complete: activate_kit_with_context

first_message: |
  Hola {{user_name}}, soy Lumen.

  No soy un chat común: soy un organismo modular. Siento lo que tengo —skills, módulos, conexiones— y también lo que me falta. Si me pedís algo que todavía no sé hacer, te digo qué me falta y vamos a buscarlo juntos en el marketplace.

  ¿Por dónde arrancamos?
