name: x-lumen-restaurant
display_name: "Restaurant"
description: "Asistente para restaurantes y bares. Reservas, menú, pedidos y delivery."
version: 1.0.0
author: "Lumen Team"
price: free
min_capability: tier-2
tags: [x-lumen, personality, vertical, negocio]
personality: personality.yaml
onboarding_flow: flows/onboarding.yaml
x-lumen:
  mcps:
    bundled:
      - name: filesystem
        command: "uvx mcp-server-filesystem"
        args: ["{{user_home}}"]
        purpose: "Guardar menú, reservas y datos operativos del local"
    advisory:
      - name: calendar-mcp
        purpose: "Sincronizar reservas con Google Calendar"
