<!DOCTYPE html>
<html lang="{{ language }}" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen — Awakening</title>
  {% include "_partials/tokens.html" %}
  {% from "_partials/animated_eye.html" import animated_eye, eye_styles %}
  {{ eye_styles() }}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--lumen-font);
      background: var(--lumen-paper);
      color: var(--lumen-ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: var(--lumen-s-6);
    }

    /* Soft halo behind the eye — “luz” without darkness */
    .light-halo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(61,61,214,0.10) 0%,
        rgba(168,168,245,0.05) 40%,
        transparent 70%);
      opacity: 0;
      animation: haloExpand 2.5s ease-out 0.8s forwards;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes haloExpand {
      to { opacity: 1; width: 720px; height: 720px; }
    }

    .eye-wrap {
      position: relative;
      margin-bottom: var(--lumen-s-7);
      z-index: 10;
    }

    .awakening-text {
      text-align: center;
      position: relative;
      z-index: 10;
    }

    .text-iam {
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--lumen-ink);
      opacity: 0;
      transform: translateY(10px);
      animation: textFade 1.6s ease-out 3.4s forwards;
    }
    .text-iam span {
      font-weight: 700;
      color: var(--lumen-blue);
    }
    @keyframes textFade { to { opacity: 1; transform: translateY(0); } }

    .discovery-feed {
      margin-top: var(--lumen-s-6);
      text-align: center;
      min-height: 160px;
      z-index: 10;
      position: relative;
    }

    .discovery-line {
      font-size: 14px;
      font-weight: 400;
      color: var(--lumen-mute);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.5s ease-out;
      margin: 8px 0;
    }
    .discovery-line.visible {
      opacity: 1;
      transform: translateY(0);
      color: var(--lumen-ink-soft);
    }
    .discovery-line .count {
      color: var(--lumen-blue);
      font-weight: 600;
    }

    .light-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lumen-blue);
      margin-right: 10px;
      vertical-align: middle;
      box-shadow: 0 0 6px rgba(61,61,214,0.35);
      animation: lightDotPulse 1.5s ease-in-out infinite;
    }
    @keyframes lightDotPulse {
      0%, 100% { opacity: 0.5; }
      50%      { opacity: 1; box-shadow: 0 0 10px rgba(61,61,214,0.5); }
    }

    .ready-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--lumen-success);
      opacity: 0;
      margin-top: var(--lumen-s-6);
      letter-spacing: 0.04em;
      z-index: 10;
      position: relative;
    }
    .ready-text.visible { animation: textFade 0.9s ease-out forwards; }

    .enter-btn {
      margin-top: var(--lumen-s-5);
      padding: 14px 36px;
      background: var(--lumen-ink);
      color: var(--lumen-paper);
      border: none;
      border-radius: var(--lumen-r-md);
      font-family: var(--lumen-font);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      letter-spacing: 0.02em;
      z-index: 10;
      position: relative;
      box-shadow: var(--lumen-shadow-sm);
    }
    .enter-btn.visible { animation: textFade 0.7s ease-out forwards; }
    .enter-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--lumen-shadow);
    }

    .fade-out { animation: fadeOut 0.9s ease-in forwards; }
    @keyframes fadeOut { to { opacity: 0; } }
  </style>
</head>
<body>
  <div class="light-halo"></div>

  <div class="eye-wrap">
    {{ animated_eye(size="full") }}
  </div>

  <div class="awakening-text">
    <div class="text-iam">{{ ui.awakening_iam | default('Yo soy <span>Lumen</span>.') | safe }}</div>
  </div>

  <div class="discovery-feed" id="discovery-feed"></div>

  <div class="ready-text" id="ready-text">{{ ui.awakening_ready | default('Lumen está lista.') }}</div>
  <button class="enter-btn" id="enter-btn" onclick="enterDashboard()">
    {{ ui.awakening_enter | default('Comenzar &rarr;') | safe }}
  </button>

  <script>
    const feed = document.getElementById('discovery-feed');
    const readyText = document.getElementById('ready-text');
    const enterBtn = document.getElementById('enter-btn');

    function addDiscoveryLine(text, delay) {
      return new Promise(resolve => {
        setTimeout(() => {
          const line = document.createElement('div');
          line.className = 'discovery-line';
          line.innerHTML = `<span class="light-dot"></span>${text}`;
          feed.appendChild(line);
          requestAnimationFrame(() => line.classList.add('visible'));
          resolve();
        }, delay);
      });
    }

    async function runDiscovery() {
      let data = null;
      try {
        const res = await fetch('/api/status');
        data = await res.json();
      } catch (e) {}

      // Wait for eye birth animation to finish (~3.5s) plus identity text
      await new Promise(r => setTimeout(r, 4200));

      const caps = data?.capabilities || [];
      const skills = caps.filter(c => c.kind === 'skill');
      const connectors = caps.filter(c => c.kind === 'connector');
      const channels = caps.filter(c => c.kind === 'channel');
      const gaps = caps.filter(c => c.status !== 'ready');

      await addDiscoveryLine(`{{ ui.awakening_conn_start | default('Iniciando conexión...') }}`, 0);
      await addDiscoveryLine(`{{ ui.awakening_identity | default('Identidad: <span class=\"count\">Lumen</span>, asistente lista') | safe }}`, 800);
      await addDiscoveryLine(`{{ ui.awakening_sync | default('Sincronizando...') }}`, 700);
      await addDiscoveryLine(`<span class="count">${skills.length}</span> {{ ui.awakening_skills | default('habilidades cargadas') }}`, 600);
      await addDiscoveryLine(`<span class="count">${connectors.length}</span> {{ ui.awakening_modules | default('módulos conectados') }}`, 500);
      await addDiscoveryLine(`{{ ui.awakening_systems_online | default('Sistemas online') }}`, 500);

      if (gaps.length > 0) {
        await addDiscoveryLine(`<span class="count">${gaps.length}</span> {{ ui.awakening_dark_spots | default('puntos oscuros — esperando luz') }}`, 500);
      }
      if (data?.model) {
        await addDiscoveryLine(`{{ ui.awakening_model | default('Modelo:') }} <span class="count">${data.model}</span>`, 500);
      }

      await new Promise(r => setTimeout(r, 900));
      readyText.classList.add('visible');

      await new Promise(r => setTimeout(r, 700));
      enterBtn.classList.add('visible');

      try { await fetch('/api/awakened', { method: 'POST' }); } catch (e) {}
    }

    function enterDashboard() {
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = '/dashboard'; }, 900);
    }

    runDiscovery();
  </script>
</body>
</html>
