<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen — Login</title>
  {% include "_partials/tokens.html" %}
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: var(--lumen-font);
      background: var(--lumen-paper);
      color: var(--lumen-ink);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--lumen-surface);
      border: 1px solid var(--lumen-line);
      border-radius: var(--lumen-r-md);
      padding: 28px;
      box-shadow: var(--lumen-shadow);
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 20px; color: var(--lumen-ink-soft); line-height: 1.6; }
    label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--lumen-ink-soft); }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--lumen-r-sm);
      border: 1px solid var(--lumen-line);
      background: var(--lumen-paper);
      font: inherit;
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: var(--lumen-r-pill);
      background: var(--lumen-ink);
      color: var(--lumen-paper);
      font: inherit;
      cursor: pointer;
    }
    .error {
      display: none;
      margin-bottom: 12px;
      color: var(--lumen-danger);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Lumen</h1>
    <p>Ingresá con la contraseña o PIN del owner para abrir el dashboard.</p>
    <div class="error" id="error"></div>
    <label for="secret">Owner password or PIN</label>
    <input id="secret" type="password" autocomplete="current-password" placeholder="••••••••">
    <button id="submit">Entrar</button>
  </div>
  <script>
    const secretInput = document.getElementById('secret');
    const errorEl = document.getElementById('error');
    async function login() {
      errorEl.style.display = 'none';
      const secret = secretInput.value.trim();
      if (!secret) {
        errorEl.textContent = 'Ingresá tu contraseña o PIN.';
        errorEl.style.display = 'block';
        return;
      }
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret }),
      });
      const data = await res.json();
      if (data.status === 'ok') {
        window.location.href = '/';
        return;
      }
      errorEl.textContent = data.error || 'No pudimos iniciar sesión.';
      errorEl.style.display = 'block';
    }
    document.getElementById('submit').addEventListener('click', login);
    secretInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') login();
    });
  </script>
</body>
</html>
